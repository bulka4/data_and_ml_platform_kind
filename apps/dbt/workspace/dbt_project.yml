# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'data_warehouse'
version: '1.0.0'

# This setting configures which "profile" dbt uses for this project.
profile: 'my_spark_project'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# directories to be removed by `dbt clean`
clean-targets:
  - "target"
  - "dbt_packages"

# Below configs has the following structure and role:
  # models:
  #   data_warehouse:
  #     # Configs for models from the models/folder_name folder.
  #     folder_name:
  #       # Tables will be saved in the schema called {project_schema}_{profiles_schema}, where:
  #       #   - project_schema - schema name specified in dbt_project.yml file
  #       #   - profiles_schema - schema name specified in profiles.yml file
  #       +schema: schema_name 
  #       # How to build models from this folder (e.g. as a table or view)
  #       +materialized: table
models:
  data_warehouse:
    # dwh_fact schema with transformed fact tables for reporting
    dwh_fact:
      +schema: fact
      +materialized: table
    # dwh_fact schema with transformed dimension tables for reporting
    dwh_dim:
      +schema: dim
      +materialized: table
    dwh_raw:
      +schema: raw
      +materialized: table
    # Schema with manually created tables which simulates data imported from external sources
    source:
      source1:
        +schema: source1
        +materialized: table
      source2:
        +schema: source2
        +materialized: table
    # Schema with tables with ML model evaluation metrics, used for monitoring models performance
    ml_metrics:
      +schema: ml_metrics
      +materialized: table