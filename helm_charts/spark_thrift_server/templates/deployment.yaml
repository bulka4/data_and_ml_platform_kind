# This deployment starts the Thrift Server and Spark Driver running in the same pod. Driver will be creating executors in separate pods.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-thrift-server
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-thrift-server
  template:
    metadata:
      labels:
        app: spark-thrift-server
    spec:
      # Service Account with permissions for creating pods and pulling images from ACR. We run Spark in this pod in the client mode,
      # so Spark driver will be created in this pod, so this pod needs this service account so driver can use it to create executor pods.
      serviceAccountName: {{ .Values.serviceAccountName }}
      # In the init container, interpolate the Spark config template file (insert values of env vars)
      initContainers:
        - name: prepare-configs
          image: {{ .Values.image.url }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              # Interpolate template config files (insert values of env vars). Prepared config file move to the ephemeral volume
              # 'conf' which is also used in the main container.
              envsubst < /opt/spark/conf/template/spark-defaults.conf.template > /opt/spark/conf/spark-defaults.conf

              # Run the Python script which prepares required 'default' schema in the Iceberg catalog. More info in comments in that script.
              # That script is provided by the image.
              python3 $SPARK_HOME/work-dir/init_iceberg_schema.py
          volumeMounts:
            - name: spark-conf-template
              mountPath: /opt/spark/conf/template
            - name: conf
              mountPath: /opt/spark/conf
          env:
            - name: STORAGE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageAccount.secret }}
                  key: storage-account
            - name: SA_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storageAccount.secret }}
                  key: sa-access-key
            - name: CONTAINER
              value: {{ .Values.storageAccount.container }}
      containers:
        - name: thrift
          image: {{ .Values.image.url }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Below command starts the Thrift Server (which is a long-running Spark Driver). Driver will run in this pod (client mode) and it will be creating 
          # executors in separate pods.

          # We use spark-submit instead of start-thriftserver.sh in order to run the Thrift Server in the foreground (there is no child process being created,
          # it runs as PID 1). Thanks to that pod doesn't change status into completed and we can see logs.
          
          # Parameters we use:
          #   - master - Use Kubernetes as a resource manager (use Kubernetes API server as the master)
          #   - spark.driver.bindAddress is an IP address to which Spark driver will bind (it will listen on that IP). That should be 
          #         pod's IP
          #   - spark.driver.host specifies a DNS name of the Spark driver which will be used by executor pods to talk to the driver
          #         It can be the name of the service which is used by the pod running the Thrift Server and driver
          #   - spark.driver.port and spark.blockManager.port might be needed (I am not sure) so driver can bind to a proper port (start listening on that port)
          #   - namespace - In which Kubernetes namespace to create executor pods
          #   - container.image - What image to use for driver and executor pods
          #   - instances - How many executors to create
          command:
            - /bin/bash
            - -c
            - |
              /opt/spark/bin/spark-submit \
              --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2 \
              --master k8s://https://$KUBERNETES_SERVICE_HOST:$KUBERNETES_SERVICE_PORT \
              --name spark-thrift-server \
              --conf spark.driver.bindAddress=$POD_IP \
              --conf spark.driver.host={{ .Values.serviceName }}.{{ .Values.namespace }}.svc.cluster.local \
              --conf spark.driver.port=7077 \
              --conf spark.blockManager.port=7078 \
              --conf spark.kubernetes.namespace={{ .Values.namespace }} \
              --conf spark.kubernetes.container.image={{ .Values.image.url }} \
              --conf spark.executor.instances=1 \
              --conf spark.executor.memory=1g \
              --conf spark.executor.cores=1 \
              --conf spark.sql.shuffle.partitions=200 \
              local:///opt/spark/jars/spark-hive-thriftserver_2.12-3.5.0.jar
          env:
            # IP address of the pod
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          # Mount config files created in the ConfigMap
          volumeMounts:
          - name: conf
            mountPath: /opt/spark/conf
          ports:
            - containerPort: 10000
          restartPolicy: Always # Restart the container if it exits
      volumes:
      - name: spark-conf-template
        configMap:
          name: spark-conf-template
      - name: conf
        emptyDir: {}