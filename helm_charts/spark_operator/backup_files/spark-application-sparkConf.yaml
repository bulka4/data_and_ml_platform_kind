# Run Spark script using Spark Application CRD. We need to have installed Spark Operator to run this.
# We use here a volume with hostPath to provide the Spark script to run.

# Spark configuration:
# We create a different folder for Spark configuration '/opt/spark/custom_conf' because Spark Operator already mounts into '/opt/spark/conf', so
# we can't mount another volume there.

apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: pyspark-app
  namespace: {{ .Values.namespace }}
spec:
  type: Python
  mode: cluster
  pythonVersion: "3"
  imagePullPolicy: {{ .Values.imagePullPolicy }}
  sparkVersion: "3.5.0"
  restartPolicy:
    type: Never

  # Spark script to run. That is a path inside the Spark Driver Pod's container. We need to start this path with 'local:///'
  # if we want to use a local file from the image. Otherwise we need to use the `spark.kubernetes.file.upload.path` Spark configuration
  # to provide information about the location of the script to run.
  mainApplicationFile: "local:///opt/spark/scripts/{{ .Values.mainApplicationFile }}"

  # Docker image with Spark
  image: {{ .Values.image }}
  # Get a secret with value for authentication to the ACR.
  # imagePullSecrets:
  # - acr-auth
  
  volumes:
    # Volume with Spark scripts. Use containerPath from kind-config.yaml as the hostPath.path.
    - name: scripts
      hostPath:
        path: /apps   # path on the Kubernetes node with Spark scripts

  sparkConf:
    # Set the default filesystem. Used when reading / writing data.
    spark.hadoop.fs.defaultFS: "abfss://${CONTAINER}@${STORAGE_ACCOUNT}.dfs.core.windows.net/"
    # Configs for authentication to Azure Storage Account (to be able to read and save data). Values.storageAccount.name is a name of the Storage Account
    # to use and SA_ACCESS_KEY is an access key to it.
    spark.hadoop.fs.azure.account.key.{{ .Values.storageAccount.name }}.dfs.core.windows.net: "${SA_ACCESS_KEY}"
    # Add additional iceberg extensions providing additional functionalities (e.g. merge, time travel)
    spark.sql.extensions: org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

    # Below spark.sql.catalog.iceberg_catalog configs define Iceberg catalog (called "iceberg_catalog", this is a name we can choose here)
    # Define the class used to perform operations on tables from the "iceberg_catalog" catalog
    spark.sql.catalog.iceberg_catalog: org.apache.iceberg.spark.SparkCatalog
    # Define to store metadata of tables from the "iceberg_catalog" catalog in the filesystem (defined by the next iceberg_catalog.warehouse config)
    spark.sql.catalog.iceberg_catalog.type: hadoop
    # Define where to store data of tables from the "iceberg_catalog" catalog
    spark.sql.catalog.iceberg_catalog.warehouse: "abfss://${CONTAINER}@${STORAGE_ACCOUNT}.dfs.core.windows.net/{{ .Values.iceberg.catalogFolder }}/"
    
    # Set up the iceberg_catalog as a default catalog. When we create a table without specifying a catalog, this catalog will be used.
    # It is needed for dbt since it creates tables without specifying catalog and it looks like we can't specify the catalog there.
    spark.sql.defaultCatalog: iceberg_catalog

  # Specify parameters for the Spark Driver Pod
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark-operator # Use service account created also in this chart so the driver can create executor pods.
    labels:
      version: 3.3.1

    # Mount a volume with Spark scripts
    volumeMounts:
      - name: scripts
        mountPath: /opt/spark/scripts  # path inside the Spark Driver Pod's container with Spark scripts

    # In the init container, interpolate the Spark config template file (insert values of env vars).
    initContainers:
      - name: prepare-configs
        image: {{ .Values.image }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        command:
          - sh
          - -c
          - |
            envsubst < /opt/spark/conf/spark-defaults.conf > /opt/spark/conf/spark-defaults.conf
        env:
          - name: STORAGE_ACCOUNT
            valueFrom:
              secretKeyRef:
                name: {{ .Values.storageAccount.secret }}
                key: storage-account
          - name: SA_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.storageAccount.secret }}
                key: sa-access-key
          - name: CONTAINER
            value: {{ .Values.storageAccount.container }}
    
    env:
      # Set up MLFLOW_TRACKING_URI env variable indicating URI of the Tracking Server to connect to.
      - name: MLFLOW_TRACKING_URI
        value: {{ .Values.mlflowTrackingUri }}
      # Set up SPARK_THRIFT_SERVER_DNS env variable indicating DNS name of the Spark Thrift Server to connect to (to get data
      # from it for training models).
      - name: SPARK_THRIFT_SERVER_DNS
        value: {{ .Values.sparkThriftServerDNS }}


  # Specify parameters for the Spark Executors' Pods 
  executor:
    cores: 1
    instances: 1
    memory: "512m"
    labels:
      version: 3.3.1

    # Mount a volume with Spark scripts
    volumeMounts:
      - name: scripts
        mountPath: /opt/spark/scripts  # path inside the Spark Driver Pod's container with Spark scripts

    # In the init container, interpolate the Spark config template file (insert values of env vars).
    initContainers:
      - name: prepare-configs
        image: {{ .Values.image }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        command:
          - sh
          - -c
          - |
            envsubst < /opt/spark/conf/spark-defaults.conf > /opt/spark/conf/spark-defaults.conf
        env:
          - name: STORAGE_ACCOUNT
            valueFrom:
              secretKeyRef:
                name: {{ .Values.storageAccount.secret }}
                key: storage-account
          - name: SA_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.storageAccount.secret }}
                key: sa-access-key
          - name: CONTAINER
            value: {{ .Values.storageAccount.container }}
    
    env:
      # Set up MLFLOW_TRACKING_URI env variable indicating URI of the Tracking Server to connect to.
      - name: MLFLOW_TRACKING_URI
        value: {{ .Values.mlflowTrackingUri }}
      # Set up SPARK_THRIFT_SERVER_DNS env variable indicating DNS name of the Spark Thrift Server to connect to (to get data
      # from it for training models).
      - name: SPARK_THRIFT_SERVER_DNS
        value: {{ .Values.sparkThriftServerDNS }}