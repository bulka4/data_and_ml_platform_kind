# Parameters related to pulling dbt code from a git repo:
#   - url - URL of the repo from which to pull code
#   - branch - Branch from which to take the code
#   - commit - Commit from which to take the code
#   - path  - Path in the repo to the dbt project. That project needs to have the following file structure:
#   |-- .dbt
#       |-- profiles.yml
#   |-- workspace
#       |-- macros
#       |-- models
#       |-- dbt_project.yml
git:
  url: https://github.com/bulka4/data_and_ml_platform_kind.git
  branch: main
  commit: ""
  path: apps/dbt